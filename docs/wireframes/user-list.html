<!--
WIREFRAME: User List + Detail Panel
Purpose  : Layout reference — KHÔNG copy inline style, chỉ tham khảo cấu trúc
Screens  : docs/screens/user-list.md + docs/screens/user-detail.md
Note     : Panel phải (aside) hiển thị nội dung theo user-detail.md khi có user được chọn
-->
<div 
  id="app-container" 
  style="display: flex; width: 100vw; height: 100vh; font-family: sans-serif; box-sizing: border-box;"
>

  <main 
    id="master-panel" 
    style="flex: 1; display: flex; flex-direction: column; padding: 24px; overflow-y: auto; background-color: #f8f9fa;"
  >
    
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <h1 style="margin: 0; font-size: 24px;">Quản lý người dùng</h1>
      <button style="padding: 8px 16px; background: #0f172a; color: white; border: none; border-radius: 4px; cursor: pointer;">
        + Thêm mới
      </button>
    </header>

    <section style="display: flex; justify-content: space-between; margin-bottom: 16px;">
      <div style="width: 300px;">
        <input 
          type="search" 
          placeholder="Tìm theo tên, email..." 
          style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"
        />
      </div>

      <div style="display: flex; gap: 8px; align-items: center;">
        <label style="font-size: 14px; color: #475569;">Trạng thái:</label>
        <select style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
          <option>Tất cả</option>
          <option>Hoạt động</option>
          <option>Khóa</option>
        </select>
      </div>
    </section>

    <section style="background: white; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;">
      <table style="width: 100%; border-collapse: collapse; text-align: left;">
        
        <thead style="background: #f1f5f9; border-bottom: 2px solid #e2e8f0;">
          <tr>
            <th style="padding: 12px 16px;">Người dùng</th>
            <th style="padding: 12px 16px;">Chức danh</th>
            <th style="padding: 12px 16px;">Tổ chức</th>
            <th style="padding: 12px 16px;">Trạng thái</th>
            <th style="padding: 12px 16px; text-align: right;">Thao tác</th>
          </tr>
        </thead>
        
        <tbody>
          <tr style="border-bottom: 1px solid #e2e8f0; cursor: pointer;">
            <td style="padding: 12px 16px;">
              <div style="display: flex; flex-direction: column;">
                <span style="font-weight: bold; color: #0f172a;">Nguyễn Văn An</span>
                <span style="font-size: 12px; color: #64748b;">an.nguyen@company.vn</span>
              </div>
            </td>
            <td style="padding: 12px 16px; color: #334155;">Trưởng phòng Kỹ thuật</td>
            <td style="padding: 12px 16px; color: #334155;">Phòng Kỹ thuật</td>
            <td style="padding: 12px 16px;">
              <span style="padding: 4px 8px; background: #dcfce7; color: #166534; border-radius: 999px; font-size: 12px;">Hoạt động</span>
            </td>
            <td style="padding: 12px 16px; text-align: right;">
              <button style="margin-right: 8px;">Edit</button>
              <button style="color: red;">Delete</button>
            </td>
          </tr>

          <tr style="border-bottom: 1px solid #e2e8f0; cursor: pointer;">
            <td style="padding: 12px 16px;">
              <div style="display: flex; flex-direction: column;">
                <span style="font-weight: bold; color: #0f172a;">Phạm Minh Đức</span>
                <span style="font-size: 12px; color: #64748b;">duc.pham@company.vn</span>
              </div>
            </td>
            <td style="padding: 12px 16px; color: #94a3b8;">—</td>
            <td style="padding: 12px 16px; color: #94a3b8;">—</td>
            <td style="padding: 12px 16px;">
              <span style="padding: 4px 8px; background: #fee2e2; color: #991b1b; border-radius: 999px; font-size: 12px;">Khóa</span>
            </td>
            <td style="padding: 12px 16px; text-align: right;">
              <button style="margin-right: 8px;">Edit</button>
              <button style="color: red;">Delete</button>
            </td>
          </tr>
        </tbody>

      </table>
    </section>
  </main>

  <aside 
    id="detail-panel" 
    style="width: 450px; background-color: white; border-left: 1px solid #cbd5e1; display: flex; flex-direction: column; padding: 24px;"
  >
    <div style="flex: 1; display: flex; justify-content: center; align-items: center; color: #94a3b8; border: 2px dashed #e2e8f0; border-radius: 8px;">
      <p>Chọn một bản ghi để xem chi tiết</p>
    </div>

    </aside>

</div>
